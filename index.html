<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bootloader</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Modernes iOS-Dunkel-Design */
        body {
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #statusContainer { display: flex; flex-direction: column; align-items: center; }

        /* Apple-Style Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Bann-Screen Styling */
        .bann-icon { font-size: 60px; color: #ff3b30; margin-bottom: 20px; animation: shake 0.5s ease-in-out; }
        .bann-text { font-size: 22px; font-weight: bold; color: #ff3b30; }
        .bann-sub { color: #8e8e93; font-size: 14px; margin-top: 10px; padding: 0 30px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="statusContainer">
        <div id="spinner" class="spinner"></div>
        <div id="statusText" style="color: #8e8e93; font-size: 16px;">Verbinde mit PC...</div>
    </div>

    <script>
        // HIER DEINE FESTE PC-TUNNEL-URL EINTRAGEN (z.B. von ngrok oder LocalXpose)
        const PC_URL = 'https://HIER_DEINE_TUNNEL_URL.ngrok-free.app/get-latest-code';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Prüfen, ob das Handy dauerhaft gebannt ist
            if (localStorage.getItem('app_status') === 'banned') {
                showBannScreen();
                return;
            }

            // 1. Sofort den alten Code aus dem Speicher laden (für High-Speed)
            const lokalerCode = localStorage.getItem('app_unterbau');
            if (lokalerCode) {
                console.log("Starte lokal gespeicherte Version...");
                fuehreCodeAus(lokalerCode);
                
                // Im Hintergrund entspannt nach Updates fragen, ohne den User aufzuhalten
                checkForUpdates(true);
            } else {
                // Erster Start: Wir MÜSSEN auf den PC warten
                document.getElementById('statusText').innerText = "Erster Start: Warte auf Freigabe am PC...";
                checkForUpdates(false);
            }
        });

        function checkForUpdates(isBackground) {
            fetch(PC_URL)
                .then(res => {
                    if (res.status === 403) {
                        throw new Error('banned');
                    }
                    return res.json();
                })
                .then(data => {
                    const lokaleVersion = localStorage.getItem('app_version');
                    
                    // Neuen Code im Speicher ablegen
                    const kombinierterCode = `<style>${data.css}</style>${data.html}<script>${data.js}<\/script>`;
                    localStorage.setItem('app_unterbau', kombinierterCode);
                    localStorage.setItem('app_version', data.version);
                    localStorage.setItem('app_status', 'active');

                    // Wenn es der erste Start war, müssen wir den Code jetzt direkt anzeigen
                    if (!isBackground) {
                        fuehreCodeAus(kombinierterCode);
                    }
                })
                .catch(err => {
                    if (err.message === 'banned') {
                        localStorage.setItem('app_status', 'banned');
                        localStorage.removeItem('app_unterbau');
                        showBannScreen();
                    } else {
                        console.log("PC offline oder Tunnel abgelaufen. Nutze lokalen Cache.");
                    }
                });
        }

        function fuehreCodeAus(code) {
            // Löscht das Lade-Skelett und injiziert die echte App
            document.open();
            document.write(code);
            document.close();
        }

        function showBannScreen() {
            document.getElementById('statusContainer').innerHTML = `
                <div class="bann-icon">🔒</div>
                <div class="bann-text">ZUGRIFF VERWEIGERT</div>
                <div class="bann-sub">Dieses Gerät wurde vom Administrator gesperrt. Der App-Code wurde lokal gelöscht.</div>
            `;
        }
    </script>
</body>
</html>
