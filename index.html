<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zentrale</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #d23a3a; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            text-align: center; 
        }
        
        #loaderContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Apple iOS Spinner */
        .apple-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #007aff;
            border-radius: 50%;
            animation: rotateSpinner 0.8s linear infinite;
            margin-bottom: 20px;
        }

        #statusMessage {
            font-size: 16px;
            color: #8e8e93;
            font-weight: 500;
        }

        .error-screen { animation: shake 0.4s ease-in-out; }
        .error-icon { font-size: 50px; color: #ff3b30; margin-bottom: 15px; }
        .error-title { font-size: 20px; font-weight: bold; color: #ff3b30; }

        @keyframes rotateSpinner { to { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div id="loaderContainer">
        <div id="spinner" class="apple-spinner"></div>
        <div id="statusMessage">Verbinde mit PC-Netzwerk...</div>
    </div>

    <script>
        // Registrierung des Hintergrund-Dienstes
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js'); 
        }

        // Die exakt gleiche anonyme API-Box wie im Python-Skript
        const BOX_ID = "elias_kamera_sync_2026_secure_stream";
        const URL_SEND = `https://kvdb.io/MN86s74YvE4Y7gE47u14mR/${BOX_ID}`;

        window.addEventListener('DOMContentLoaded', async () => {
            // 1. Dem PC signalisieren, dass die App offen ist und wartet
            document.getElementById('statusMessage').innerText = "Warte auf Freigabe am PC...";
            try {
                await fetch(URL_SEND, { method: 'POST', body: 'ping' });
            } catch(e) {
                document.getElementById('statusMessage').innerText = "Verbindungsfehler. Wiederhole...";
            }

            // 2. Auf das verschlüsselte Push-Rücksignal vom Service Worker warten
            navigator.serviceWorker.addEventListener('message', event => {
                const packet = event.data;
                
                if (packet.status === 'allow') {
                    // Der magische Moment: Überschreibe die leere Hülle mit dem echten Code vom PC
                    document.open();
                    document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
                            <style>${packet.css}</style>
                        </head>
                        <body>
                            ${packet.html}
                            <script>${packet.js}<\/script>
                        </body>
                        </html>
                    `);
                    document.close();
                } else {
                    // Bann / Zugriff verweigert ausgeben
                    document.getElementById('loaderContainer').className = "error-screen";
                    document.getElementById('loaderContainer').innerHTML = `
                        <div class="error-icon">🔒</div>
                        <div class="error-title">ZUGRIFF VERWEIGERT</div>
                        <div style="color:#8e8e93; margin-top:8px; font-size:14px;">Anfrage am PC abgelehnt.</div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
